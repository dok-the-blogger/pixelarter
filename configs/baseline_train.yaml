dataset:
  data_dir: "data/raw"
  input_size: 32
  target_size: 16
  epoch_length: 500

dataloader:
  batch_size: 16
  num_workers: 4
  shuffle: true

model:
  name: "baseline_cnn"
  in_channels: 3
  out_channels: 3
  head_type: "rgb"

training:
  epochs: 100
  lr: 0.0001
  device: "cuda"
  save_dir: "runs/baseline"
  log_every_n_steps: 10

degradation:
  enabled: true
  scale_range: [1.0, 4.0]
  noise_var_range: [0.0, 0.002]
  color_jitter_strength: 0.05
  blur_prob: 0.3
  jpeg_prob: 0.2
  shift_prob: 0.5
